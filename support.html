<h1>词汇通 技术支持</h1>

<div class="qa">
  <div class="q">Q: 词库如何加载？</div>
  <div class="a">在「背词」页面选择一个词库（如 CET4），系统会自动加载。</div>
</div>

<div class="qa">
  <div class="q">Q: 学习模式有哪些？</div>
  <div class="a">提供三种模式：浏览、选择题、拼写。可自由组合勾选。</div>
</div>

<div class="qa">
  <div class="q">Q: 词根模块是什么？</div>
  <div class="a">按词根/前缀/后缀分类展示常用词根词缀及其派生词，配有思维导图。</div>
</div>

<div class="qa">
  <div class="q">Q: 数据会丢失吗？</div>
  <div class="a">所有数据存储在设备本地，卸载会清除。建议定期 iCloud 备份。</div>
</div>

<div class="qa">
  <div class="q">Q: 需要网络吗？</div>
  <div class="a">完全离线运行，无需网络连接。</div>
