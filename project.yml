name: VocabApp
options:
  bundleIdPrefix: com.vocabapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  SWIFT_VERSION: "6.0"

targets:
  VocabApp:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Services
      - ViewModels
      - Views
      - Resources
      - Utilities
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vocabapp
      INFOPLIST_FILE: VocabApp/Info.plist
    info:
      path: VocabApp/Info.plist
    entitlements:
      path: VocabApp/VocabApp.entitlements
    dependencies: []
    resources:
      - path: Resources/WordBanks
      - path: StoreKit/Products.storekit

  VocabAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VocabAppTests
    settings:
      TEST_TARGET_NAME: VocabApp
      PRODUCT_BUNDLE_IDENTIFIER: com.vocabapp.tests
      INFOPLIST_FILE: VocabAppTests/Info.plist
    dependencies:
      - target: VocabApp
    resources:
      - path: Resources/WordBanks
